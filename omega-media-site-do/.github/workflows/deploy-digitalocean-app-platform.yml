name: Deploy Omega site to DigitalOcean App Platform

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: digitalocean-app-platform-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          VITE_CONTACT_EMAIL: ${{ secrets.VITE_CONTACT_EMAIL }}
          VITE_PHONE_DISPLAY: ${{ secrets.VITE_PHONE_DISPLAY }}
          VITE_WHATSAPP_NUMBER: ${{ secrets.VITE_WHATSAPP_NUMBER }}
          VITE_FORMSPREE_ENDPOINT: ${{ secrets.VITE_FORMSPREE_ENDPOINT }}
          VITE_INSTAGRAM_URL: ${{ secrets.VITE_INSTAGRAM_URL }}
          VITE_FACEBOOK_URL: ${{ secrets.VITE_FACEBOOK_URL }}
        run: npm run build

      - name: Deploy to DigitalOcean App Platform
        id: deploy
        uses: digitalocean/app_action/deploy@v2
        env:
          VITE_CONTACT_EMAIL: ${{ secrets.VITE_CONTACT_EMAIL }}
          VITE_PHONE_DISPLAY: ${{ secrets.VITE_PHONE_DISPLAY }}
          VITE_WHATSAPP_NUMBER: ${{ secrets.VITE_WHATSAPP_NUMBER }}
          VITE_FORMSPREE_ENDPOINT: ${{ secrets.VITE_FORMSPREE_ENDPOINT }}
          VITE_INSTAGRAM_URL: ${{ secrets.VITE_INSTAGRAM_URL }}
          VITE_FACEBOOK_URL: ${{ secrets.VITE_FACEBOOK_URL }}
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          app_spec_location: .do/app.yaml
          print_build_logs: true
          print_deploy_logs: true

      - name: Show deployment summary
        run: |
          echo 'Deployment completed.'
          echo '${{ steps.deploy.outputs.app }}'
